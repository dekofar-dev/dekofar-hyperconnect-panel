name: Build and deploy Angular app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu GitHub'dan çek
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Angular bağımlılıklarını yükle ve build et
        run: |
          npm install --legacy-peer-deps
          npm run build -- --configuration production

      - name: Build çıktısını zip’le
        run: |
          cd dist
          project_folder=$(ls -d */ | head -n 1 | cut -f1 -d'/')
          zip -r ../release.zip "$project_folder"
          cd ..

      - name: Azure Web App'e yükle (Zip Deploy)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'dekofar-hyperconnect-panel'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: release.zip
